<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Edit Job - Smart Job</title><script src="https://cdn.tailwindcss.com?plugins=forms"></script><link rel="stylesheet" href="css/style.css" /></head>
<body onload="protect(); requireRecruiter(); loadLayout('jobs'); loadEditJob()" class="bg-[#faf8ff]"><div id="navbar"></div><main class="pt-28 pb-12 px-4 max-w-4xl mx-auto w-full"><div class="bg-white rounded-2xl shadow p-6"><h2 class="text-2xl font-bold mb-6">Edit Job</h2><form id="edit-job-form" class="space-y-4"><input id="title" class="form-input" type="text" placeholder="Job Title" required /><textarea id="description" class="form-textarea" rows="4" placeholder="Job Description" required></textarea><textarea id="requirements" class="form-textarea" rows="4" placeholder="Requirements" required></textarea><input id="location" class="form-input" type="text" placeholder="Location" required /><input id="salaryRange" class="form-input" type="text" placeholder="Salary Range" /><input id="jobType" class="form-input" type="text" placeholder="Job Type" required /><input id="experienceLevel" class="form-input" type="text" placeholder="Experience Level" /><input id="skills" class="form-input" type="text" placeholder="Skills" /><div class="grid md:grid-cols-2 gap-4"><input id="contactEmail" class="form-input" type="email" placeholder="Recruiter Contact Email" /><input id="contactPhone" class="form-input" type="text" placeholder="Recruiter Phone Number" /></div><div class="flex justify-end gap-3"><button type="button" onclick="goBackPage()" class="btn-outline">Cancel</button><button type="submit" class="btn-primary">Save Changes</button></div></form></div></main><div id="footer"></div><script src="js/app.js"></script><script>
async function loadEditJob(){ const id=getJobId(); if(!id){ location.href='jobs.html'; return; } try{ const job=await apiFetch(`/jobs/${id}`); title.value=job.title || ''; description.value=job.description || ''; requirements.value=job.requirements || ''; location.value=job.location || ''; salaryRange.value=job.salaryRange || ''; jobType.value=job.jobType || ''; experienceLevel.value=job.experienceLevel || ''; skills.value=job.skills || ''; contactEmail.value=job.contactEmail || job.recruiter?.email || ''; contactPhone.value=job.contactPhone || ''; }catch(err){ showToast(err.message, "error"); } }
document.getElementById('edit-job-form').addEventListener('submit', async e=>{ e.preventDefault(); const id=getJobId(); try{ await apiFetch(`/jobs/${id}`,{method:'PUT', body:JSON.stringify({title:title.value,description:description.value,requirements:requirements.value,location:location.value,salaryRange:salaryRange.value,jobType:jobType.value,experienceLevel:experienceLevel.value,skills:skills.value,contactEmail:contactEmail.value,contactPhone:contactPhone.value})}); showToast('Job updated successfully'); goBackPage(); }catch(err){ showToast(err.message, "error"); } });
</script></body></html>
