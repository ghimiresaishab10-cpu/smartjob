<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Job - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: #faf8ff; }
  </style>
</head>
<body onload="protect(); loadLayout('jobs'); loadEditJob()">

  <div id="navbar"></div>

  <main class="pt-28 pb-12 px-4 max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-2xl font-bold mb-6">Edit Job</h2>

      <form id="edit-job-form" class="space-y-4">
        <input id="title" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Job Title" required />
        <textarea id="description" class="w-full p-4 rounded-xl bg-slate-100 outline-none" rows="4" placeholder="Job Description" required></textarea>
        <textarea id="requirements" class="w-full p-4 rounded-xl bg-slate-100 outline-none" rows="4" placeholder="Requirements" required></textarea>
        <input id="location" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Location" />
        <input id="salaryRange" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Salary Range" />
        <input id="jobType" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Job Type" required />
        <input id="experienceLevel" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Experience Level" />
        <input id="skills" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Skills" />

        <div class="flex justify-end gap-3">
          <button type="button" onclick="goBackPage()" class="px-5 py-3 rounded-full border border-slate-300 text-blue-700 font-semibold">
            Cancel
          </button>
          <button type="submit" class="bg-blue-700 text-white px-6 py-3 rounded-full font-semibold">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    async function loadEditJob() {
      const id = getJobId();
      if (!id) {
        location.href = "jobs.html";
        return;
      }

      try {
        const job = await apiFetch(`/jobs/${id}`);

        document.getElementById("title").value = job.title || "";
        document.getElementById("description").value = job.description || "";
        document.getElementById("requirements").value = job.requirements || "";
        document.getElementById("location").value = job.location || "";
        document.getElementById("salaryRange").value = job.salaryRange || "";
        document.getElementById("jobType").value = job.jobType || "";
        document.getElementById("experienceLevel").value = job.experienceLevel || "";
        document.getElementById("skills").value = job.skills || "";
      } catch (err) {
        alert(err.message);
      }
    }

    document.getElementById("edit-job-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = getJobId();

      try {
        await apiFetch(`/jobs/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            requirements: document.getElementById("requirements").value,
            location: document.getElementById("location").value,
            salaryRange: document.getElementById("salaryRange").value,
            jobType: document.getElementById("jobType").value,
            experienceLevel: document.getElementById("experienceLevel").value,
            skills: document.getElementById("skills").value
          })
        });

        alert("Job updated successfully");
        goBackPage();
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
