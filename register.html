<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Poppins',sans-serif;background:#faf8ff;}</style>
</head>
<body class="min-h-screen flex flex-col">

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-2 max-w-5xl w-full bg-white rounded-xl overflow-hidden shadow">
      <div class="hidden lg:flex flex-col justify-between p-12 bg-gradient-to-br from-blue-700 to-blue-500 text-white">
        <div>
          <h1 class="text-4xl font-extrabold leading-tight mb-6">Design Your <br />Professional Future.</h1>
          <p class="text-lg opacity-90 max-w-sm">Join an elite network of professionals where job seeking is curated, not just listed.</p>
        </div>
      </div>

      <div class="p-8 md:p-12 lg:p-16">
        <div class="mb-10">
          <h2 class="text-3xl font-bold mb-2">Create Account</h2>
          <p class="text-slate-500 text-sm">Start your curated career journey today.</p>
        </div>

        <div id="register-message" class="hidden mb-4 p-3 rounded-lg bg-green-100 text-green-700 text-sm font-medium">
          Registered successfully. Now click Login.
        </div>

        <form id="register-form" class="space-y-5">
          <input id="name" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="text" placeholder="Full Name" required />
          <input id="email" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="email" placeholder="Email Address" required />
          <input id="password" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="password" placeholder="Password" required />

          <select id="role" class="w-full p-4 rounded-xl bg-slate-100 outline-none" required>
            <option value="candidate">Candidate</option>
            <option value="recruiter">Recruiter</option>
          </select>

          <button class="w-full bg-blue-700 text-white py-4 rounded-full font-semibold" type="submit">Register</button>

          <div class="text-center pt-2">
            <p class="text-sm text-slate-500">
              Already have an account?
              <a href="login.html" class="text-blue-700 font-bold hover:underline">Login</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    loadComponent("footer", "components/footer.html");

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        await apiFetch("/auth/register", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
          })
        });

        document.getElementById("register-message").classList.remove("hidden");
        document.getElementById("register-form").reset();
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
