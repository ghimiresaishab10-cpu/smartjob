<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register - Smart Job</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />

  <style>
    *{
      font-family: 'Poppins', sans-serif;
    }

    body{
      background: linear-gradient(to bottom right,#eff6ff,#ffffff,#dbeafe);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <main class="flex-grow flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md bg-white rounded-[28px] shadow-2xl border border-blue-100 p-8">

      <div class="text-center mb-8">

        <div class="w-16 h-16 rounded-2xl bg-blue-600 text-white flex items-center justify-center text-2xl font-bold mx-auto mb-5 shadow-lg">
          SJ
        </div>

        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">
          Create Account
        </h1>

        <p class="text-slate-500 text-sm leading-relaxed">
          Choose your role. Recruiter details can be edited later in profile.
        </p>

      </div>

      <form id="register-form" class="space-y-5">

        <div>
          <input
            id="name"
            type="text"
            placeholder="Full Name"
            required
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />
        </div>

        <div>
          <input
            id="email"
            type="email"
            placeholder="Email Address"
            required
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />
        </div>

        <div>
          <input
            id="password"
            type="password"
            placeholder="Password"
            required
            pattern="(?=.*[A-Z])(?=.*\d).{8,}"
            title="Minimum 8 characters with one uppercase letter and one number"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />

          <p class="text-xs text-slate-500 mt-2 ml-1">
            Minimum 8 characters, one uppercase letter and one number.
          </p>
        </div>

        <div>
          <select
            id="role"
            required
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
          >
            <option value="candidate">Candidate</option>
            <option value="recruiter">Recruiter</option>
          </select>
        </div>

        <div id="company-field" class="hidden">

          <input
            id="companyName"
            type="text"
            placeholder="Company Name"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />

          <p class="text-xs text-slate-500 mt-2 ml-1">
            Company details can be edited later from recruiter profile.
          </p>

        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition shadow-lg hover:scale-[1.01]"
        >
          Register
        </button>

      </form>

      <p class="text-center mt-7 text-sm text-slate-500">
        Already have an account?
        <a href="login.html" class="text-blue-700 font-bold hover:underline">
          Login
        </a>
      </p>

    </div>

  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>

  <script>
    loadComponent("footer", "components/footer.html");

    const roleEl = document.getElementById("role");
    const companyField = document.getElementById("company-field");
    const companyName = document.getElementById("companyName");

    function toggleCompanyField() {

      if (roleEl.value === "recruiter") {
        companyField.classList.remove("hidden");
        companyName.required = true;
      } else {
        companyField.classList.add("hidden");
        companyName.required = false;
      }
    }

    roleEl.addEventListener("change", toggleCompanyField);

    toggleCompanyField();

    document
      .getElementById("register-form")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        try {

          const body = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            role: roleEl.value,
          };

          if (roleEl.value === "recruiter") {
            body.companyName = companyName.value.trim();
          }

          await apiFetch("/auth/register", {
            method: "POST",
            body: JSON.stringify(body),
          });

          showToast("Registered successfully");

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1200);

        } catch (err) {

          console.error(err);

          showToast(
            err.message || "Registration failed",
            "error"
          );
        }
      });
  </script>

</body>
</html>
