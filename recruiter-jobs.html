<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Jobs - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="protect(); requireRecruiter(); loadLayout(); loadRecruiterJobs()" class="bg-[#faf8ff]">

  <div id="navbar"></div>

  <main class="pt-28 pb-20 px-6 max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">My Jobs</h1>
      <button onclick="location.href='post-job.html'" class="btn-primary">+ Post Job</button>
    </div>

    <div id="my-jobs-list" class="space-y-6"></div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    async function loadRecruiterJobs() {
      try {
        const data = await apiFetch("/jobs/my-jobs");
        const jobs = data.jobs || data || [];
        const container = document.getElementById("my-jobs-list");
        container.innerHTML = "";

        if (!jobs.length) {
          container.innerHTML = `<div class="card text-slate-500">You have not posted any jobs yet.</div>`;
          return;
        }

        jobs.forEach(job => {
          container.innerHTML += `
            <div class="card">
              <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                  <h3 class="text-xl font-bold">${job.title || "Untitled Job"}</h3>
                  <p class="text-slate-500 mt-1">${job.location || "Location not specified"}</p>
                  <div class="mt-3">
                    ${job.isClosed
                      ? `<span class="badge badge-orange">Closed</span>`
                      : `<span class="badge badge-blue">Open</span>`
                    }
                  </div>
                </div>

                <div class="flex flex-wrap gap-3">
                  <button onclick="openJob('${job.id}')" class="btn-outline">View</button>
                  ${job.isClosed
                    ? `<button onclick="reopenJob('${job.id}')" class="btn-primary">Reopen</button>`
                    : `<button onclick="closeJob('${job.id}')" class="btn-outline">Close</button>`
                  }
                  <button onclick="deleteJob('${job.id}')" class="btn-primary" style="background:#dc2626">Delete</button>
                </div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        alert(err.message);
      }
    }

    function openJob(id) {
      localStorage.setItem("jobId", id);
      location.href = "job-details.html";
    }

    async function closeJob(id) {
      await apiFetch(`/jobs/${id}/close`, { method: "PATCH" });
      loadRecruiterJobs();
    }

    async function reopenJob(id) {
      await apiFetch(`/jobs/${id}/reopen`, { method: "PATCH" });
      loadRecruiterJobs();
    }

    async function deleteJob(id) {
      if (!confirm("Delete this job?")) return;
      await apiFetch(`/jobs/${id}`, { method: "DELETE" });
      loadRecruiterJobs();
    }
  </script>
</body>
</html>
