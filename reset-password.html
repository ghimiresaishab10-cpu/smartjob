<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><script src="https://cdn.tailwindcss.com?plugins=forms"></script><link rel="stylesheet" href="css/style.css"/><title>Reset Password - Smart Job</title></head><body onload="loadLayout()"><div id="navbar"></div><main class="page-shell px-6 max-w-lg mx-auto w-full"><div class="pro-card"><h1 class="text-3xl font-extrabold mb-3">Reset Password</h1><p class="text-slate-500 mb-6">Password must be minimum 8 characters with one uppercase letter and one number.</p><form id="resetForm" class="space-y-5"><div><label>Token</label><input id="token" required/></div><div><label>New Password</label><input id="newPassword" type="password" required pattern="(?=.*[A-Z])(?=.*\d).{8,}" title="Minimum 8 characters, one uppercase letter and one number"/></div><button class="btn-primary w-full" type="submit">Reset Password</button></form></div></main><div id="footer"></div><script src="js/app.js"></script><script>const params=new URLSearchParams(location.search);document.getElementById('token').value=params.get('token')||'';document.getElementById('resetForm').addEventListener('submit',async e=>{e.preventDefault();const p=document.getElementById('newPassword').value;if(!/^(?=.*[A-Z])(?=.*\d).{8,}$/.test(p)){showToast('Password must be at least 8 characters with one uppercase letter and one number.','error');return;}try{await apiFetch('/auth/reset-password',{method:'POST',body:JSON.stringify({token:document.getElementById('token').value,newPassword:p})});showToast('Password reset successfully');setTimeout(()=>location.href='login.html',1000);}catch(err){showToast(err.message,'error');}});</script></body></html>
