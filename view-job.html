<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Job - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: #faf8ff; }
  </style>
</head>
<body onload="protect(); loadLayout('jobs'); loadViewJob()" class="min-h-screen">

  <div id="navbar"></div>

  <main class="pt-28 pb-20 px-6 max-w-6xl mx-auto">
    <div class="mb-6">
      <button onclick="goBackPage()" class="text-blue-700 font-semibold">← Back</button>
    </div>

    <div class="grid lg:grid-cols-[1fr_320px] gap-8">
      <div class="bg-white rounded-2xl shadow p-6">
        <div class="flex justify-between items-start gap-4">
          <div>
            <h1 id="job-title" class="text-4xl font-extrabold">Loading...</h1>
            <p id="job-meta" class="text-slate-500 mt-3"></p>
          </div>
          <div id="job-status"></div>
        </div>

        <div class="mt-8">
          <h2 class="text-2xl font-bold mb-4">Job Description</h2>
          <p id="job-description" class="text-slate-600 leading-7"></p>
        </div>

        <div class="mt-8">
          <h2 class="text-2xl font-bold mb-4">Requirements</h2>
          <p id="job-requirements" class="text-slate-600 leading-7"></p>
        </div>
      </div>

      <aside class="bg-white rounded-2xl shadow p-6 h-fit">
        <h3 class="text-xl font-bold mb-6">Position Overview</h3>
        <div class="space-y-4 text-sm">
          <p><strong>Salary:</strong> <span id="job-salary">N/A</span></p>
          <p><strong>Job Type:</strong> <span id="job-type">N/A</span></p>
          <p><strong>Experience:</strong> <span id="job-experience">N/A</span></p>
          <p><strong>Location:</strong> <span id="job-location">N/A</span></p>
        </div>

        <div id="job-actions" class="mt-8"></div>
      </aside>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    let currentJob = null;

    async function loadViewJob() {
      const id = getJobId();
      if (!id) {
        location.href = "jobs.html";
        return;
      }

      const job = await apiFetch(`/jobs/${id}`);
      currentJob = job;

      document.getElementById("job-title").textContent = job.title || "Untitled Job";
      document.getElementById("job-meta").textContent = `${(job.recruiter?.company?.name || "Company")} • ${job.location || "Location not specified"}`;
      document.getElementById("job-description").textContent = job.description || "No description available.";
      document.getElementById("job-requirements").textContent = job.requirements || "No requirements listed.";
      document.getElementById("job-salary").textContent = job.salaryRange || "N/A";
      document.getElementById("job-type").textContent = job.jobType || "N/A";
      document.getElementById("job-experience").textContent = job.experienceLevel || "N/A";
      document.getElementById("job-location").textContent = job.location || "N/A";

      document.getElementById("job-status").innerHTML = job.status === "closed"
        ? `<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-700">Closed</span>`
        : `<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Open</span>`;

      const user = getUser();
      const actions = document.getElementById("job-actions");

      if (user?.role === "candidate" && job.status !== "closed") {
        actions.innerHTML = `<button onclick="applyNow()" class="bg-blue-700 text-white px-6 py-3 rounded-full font-semibold w-full">Apply Now</button>`;
      } else if (user?.role === "recruiter") {
        actions.innerHTML = `
          <div class="flex flex-col gap-3">
            <button onclick="editNow()" class="px-5 py-3 rounded-full border border-slate-300 text-blue-700 font-semibold">Edit</button>
            ${job.status === "closed"
              ? `<button onclick="reopenNow()" class="bg-blue-700 text-white px-6 py-3 rounded-full font-semibold">Reopen</button>`
              : `<button onclick="closeNow()" class="px-5 py-3 rounded-full border border-slate-300 text-blue-700 font-semibold">Close</button>`
            }
            <button onclick="deleteNow()" class="bg-red-600 text-white px-6 py-3 rounded-full font-semibold">Delete</button>
          </div>
        `;
      }
    }

    function applyNow() {
      location.href = "apply.html";
    }

    function editNow() {
      location.href = "edit-job.html";
    }

    async function closeNow() {
      const ok = confirm("Are you sure you want to close the job?");
      if (!ok) return;

      await apiFetch(`/jobs/${currentJob.id}/close`, { method: "PATCH" });
      loadViewJob();
    }

    async function reopenNow() {
      await apiFetch(`/jobs/${currentJob.id}/reopen`, { method: "PATCH" });
      loadViewJob();
    }

    async function deleteNow() {
      const ok = confirm("Are you sure you want to delete this job?");
      if (!ok) return;

      await apiFetch(`/jobs/${currentJob.id}`, { method: "DELETE" });
      location.href = "jobs.html";
    }
  </script>
</body>
</html>
