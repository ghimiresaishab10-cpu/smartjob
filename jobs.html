<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f3f2ef; }
  </style>
</head>
<body onload="protect(); loadLayout('jobs'); initJobsPage()">

  <div id="navbar"></div>

  <main class="pt-28 pb-12 px-4 max-w-7xl mx-auto">
    <div class="grid lg:grid-cols-[280px_minmax(0,1fr)] gap-6">
      <aside id="left-sidebar"></aside>

      <section class="space-y-6">
        <!-- recruiter create post -->
        <div id="recruiter-create-box" class="hidden-force bg-white rounded-2xl shadow p-6">
          <div class="flex items-center gap-4">
            <div id="mini-avatar" class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-blue-700 font-bold"></div>

            <button onclick="location.href='job-create.html'"
              class="w-full text-left border border-slate-300 rounded-full px-6 py-3 text-slate-600 font-medium hover:bg-slate-50">
              Start a post
            </button>
          </div>

          <div class="mt-5 flex gap-4 text-slate-600 text-sm font-medium flex-wrap">
            
            <button onclick="location.href='job-create.html'" class="hover:text-blue-700">Add Job</button>
          </div>
        </div>

        <div id="jobs-feed" class="space-y-6"></div>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    function renderLeftSidebar() {
      const user = getUser();
      const left = document.getElementById("left-sidebar");

      if (user) {
        left.innerHTML = profileCardHTML(user);

        const initials = (user.name || "U")
          .split(" ")
          .map(w => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();

        const mini = document.getElementById("mini-avatar");
        if (mini) mini.textContent = initials;
      } else {
        left.innerHTML = `
          <div class="bg-white rounded-2xl shadow p-6">
            <h3 class="text-2xl font-bold">Smart Job</h3>
            <p class="text-slate-500 mt-3">Login or register to continue.</p>
          </div>
        `;
      }
    }

    async function renderJobs() {
      const feed = document.getElementById("jobs-feed");
      const data = await apiFetch("/jobs");
      const jobs = data.jobs || [];
      const user = getUser();

      feed.innerHTML = "";

      if (!jobs.length) {
        if (user?.role === "recruiter") {
          feed.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-8 text-center">
              <h3 class="text-2xl font-bold mb-3">No jobs posted yet</h3>
              <p class="text-slate-500 mb-6">Start by creating your first job post.</p>
              <button onclick="location.href='job-create.html'" class="bg-blue-700 text-white px-6 py-3 rounded-full font-semibold">
                Create Job
              </button>
            </div>
          `;
        } else {
          feed.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-8 text-center">
              <h3 class="text-2xl font-bold mb-3">No jobs available</h3>
              <p class="text-slate-500">Please check again later.</p>
            </div>
          `;
        }
        return;
      }

      jobs.forEach(job => {
        let actions = `
          <button onclick="viewJob('${job.id}')" class="small-btn small-blue">View</button>
        `;

        if (user?.role === "candidate" && job.status !== "closed") {
          actions += `
            <button onclick="applyJob('${job.id}')" class="small-btn small-gray">Apply Now</button>
          `;
        }

        if (user?.role === "recruiter") {
          actions += `
            <button onclick="editJob('${job.id}')" class="small-btn small-gray">Edit</button>
          `;

          actions += job.status === "closed"
            ? `<button onclick="reopenJob('${job.id}')" class="small-btn small-gray">Reopen</button>`
            : `<button onclick="closeJob('${job.id}')" class="small-btn small-gray">Close</button>`;

          actions += `
            <button onclick="deleteJob('${job.id}')" class="small-btn small-red">Delete</button>
          `;
        }

        feed.innerHTML += `
          <article class="bg-white rounded-2xl shadow p-6">
            <div class="flex justify-between items-start gap-4">
              <div>
                <h3 class="text-xl font-bold">${job.title || "Untitled Job"}</h3>
                <p class="text-slate-600 mt-2">
                  ${job.recruiter?.company?.name || "Company"} • ${job.location || "Location not specified"}
                </p>
              </div>

              ${job.status === "closed"
                ? `<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-700">Closed</span>`
                : `<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Open</span>`
              }
            </div>

            <p class="text-slate-500 mt-4">${job.description || "No description available."}</p>

            <div class="mt-6 flex flex-wrap gap-3">
              ${actions}
            </div>
          </article>
        `;
      });
    }

    async function initJobsPage() {
      const user = getUser();

      renderLeftSidebar();

      if (user?.role === "recruiter") {
        document.getElementById("recruiter-create-box").classList.remove("hidden-force");
      }

      await renderJobs();
    }

    function viewJob(id) {
      saveJobId(id);
      saveBackPage("jobs.html");
      location.href = "view-job.html";
    }

    function editJob(id) {
      saveJobId(id);
      saveBackPage("jobs.html");
      location.href = "edit-job.html";
    }

    function applyJob(id) {
      saveJobId(id);
      saveBackPage("jobs.html");
      location.href = "apply.html";
    }

    async function closeJob(id) {
      const ok = confirm("Are you sure you want to close the job?");
      if (!ok) return;

      try {
        await apiFetch(`/jobs/${id}/close`, { method: "PATCH" });
        await renderJobs();
      } catch (err) {
        alert(err.message);
      }
    }

    async function reopenJob(id) {
      const ok = confirm("Are you sure you want to reopen the job?");
      if (!ok) return;

      try {
        await apiFetch(`/jobs/${id}/reopen`, { method: "PATCH" });
        await renderJobs();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteJob(id) {
      const ok = confirm("Are you sure you want to delete this job?");
      if (!ok) return;

      try {
        await apiFetch(`/jobs/${id}`, { method: "DELETE" });
        await renderJobs();
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
