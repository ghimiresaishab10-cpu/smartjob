<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="protect(); loadLayout(); renderProfile()" class="bg-[#faf8ff]">

  <div id="navbar"></div>

  <main class="pt-28 pb-20 px-6 max-w-4xl mx-auto">
    <div class="card">
      <div class="flex flex-col md:flex-row gap-6 items-center md:items-start">
        <div class="w-24 h-24 rounded-full bg-blue-700 text-white flex items-center justify-center text-3xl font-bold" id="profile-avatar"></div>

        <div class="flex-1">
          <h1 id="profile-name" class="text-3xl font-bold"></h1>
          <p id="profile-email" class="text-slate-500 mt-2"></p>
          <span id="profile-role" class="badge badge-blue mt-4"></span>

          <div class="mt-6">
            <button onclick="location.href='settings.html'" class="btn-primary">Open Settings</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    function renderProfile() {
      const user = getUser();
      if (!user) return;

      document.getElementById("profile-name").textContent = user.name || "User";
      document.getElementById("profile-email").textContent = user.email || "";
      document.getElementById("profile-role").textContent = user.role || "";
      document.getElementById("profile-avatar").textContent = (user.name || "U")
        .split(" ")
        .map(w => w[0])
        .slice(0, 2)
        .join("")
        .toUpperCase();
    }
  </script>
</body>
</html>
