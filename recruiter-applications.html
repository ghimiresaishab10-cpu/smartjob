<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruiter Applications - Smart Job</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    onload="
      protect();
      requireRecruiter();
      loadLayout('jobs');
      loadRecruiterApplications();
    "
    class="bg-[#faf8ff]"
  >
    <div id="navbar"></div>
    <main class="pt-28 pb-20 px-6 max-w-7xl mx-auto w-full">
      <div
        class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8"
      >
        <div>
          <h1 class="text-3xl font-bold">Applications</h1>
          <p class="text-slate-500 mt-2">
            Review candidate applications for your posted jobs.
          </p>
        </div>
      </div>
      <div class="card mb-6">
        <input
          id="applications-search"
          class="form-input"
          placeholder="Search by candidate name, email, or job title"
          oninput="renderRecruiterApplications()"
        />
      </div>
      <div
        id="status-message"
        class="hidden mb-6 rounded-xl px-4 py-3 text-sm font-medium"
      ></div>
      <div id="recruiter-applications-list" class="space-y-6"></div>
    </main>
    <div id="footer"></div>
    <script src="js/app.js"></script>
    <script>
      let recruiterApplications = [];
      const statuses = ["pending", "in review", "accepted", "rejected"];
      function showMessage(text, isError = false) {
        const box = document.getElementById("status-message");
        box.textContent = text;
        box.classList.remove("hidden");
        box.className = isError
          ? "mb-6 rounded-xl px-4 py-3 text-sm font-medium bg-red-100 text-red-700"
          : "mb-6 rounded-xl px-4 py-3 text-sm font-medium bg-green-100 text-green-700";
      }
      function statusBadge(status) {
        const v = (status || "pending").toLowerCase();
        const cls =
          v === "rejected"
            ? "bg-red-100 text-red-700"
            : v === "in review"
              ? "bg-yellow-100 text-yellow-700"
              : v === "accepted"
                ? "bg-green-100 text-green-700"
                : "bg-blue-100 text-blue-700";
        return `<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold ${cls} capitalize">${v}</span>`;
      }
      function getStatusOptions(current) {
        return statuses
          .map(
            (s) =>
              `<option value="${s}" ${current === s ? "selected" : ""}>${s}</option>`,
          )
          .join("");
      }
      async function loadRecruiterApplications() {
        try {
          recruiterApplications = await apiFetch("/applications/recruiter");
          renderRecruiterApplications();
        } catch (err) {
          document.getElementById("recruiter-applications-list").innerHTML =
            `<div class="card text-red-600">${err.message}</div>`;
        }
      }
      function renderRecruiterApplications() {
        const q = (
          document.getElementById("applications-search")?.value || ""
        ).toLowerCase();
        const apps = recruiterApplications.filter((app) =>
          [app.fullName, app.email, app.phone, app.job?.title]
            .join(" ")
            .toLowerCase()
            .includes(q),
        );
        const container = document.getElementById(
          "recruiter-applications-list",
        );
        container.innerHTML = "";
        if (!apps.length) {
          container.innerHTML = `<div class="card text-slate-500">No applications found.</div>`;
          return;
        }
        apps.forEach((app) => {
          const job = app.job || {};
          const candidate = app.candidate || {};
          const resumeName =
            app.resumeName ||
            (app.resumeUrl ? String(app.resumeUrl).split("/").pop() : "Resume");
          const resumePath = app.resumeUrl
            ? String(app.resumeUrl).replace(/'/g, "\\'").replace(/\\/g, "\\\\")
            : "";
          const current = (app.status || "pending").toLowerCase();
          container.innerHTML += `<article class="bg-white rounded-2xl shadow p-6"><div class="grid lg:grid-cols-[1fr_240px] gap-6"><div><div class="flex flex-wrap items-center gap-3 mb-3"><h3 class="text-xl font-bold">${job.title || "Untitled Job"}</h3>${statusBadge(app.status)}</div><p class="text-slate-500">${job.location || "Location not specified"}</p><div class="mt-5 grid md:grid-cols-2 gap-4 text-sm"><p><strong>Candidate:</strong> <button onclick="viewUserProfile('${candidate.id || app.candidateId || ""}')" class="text-blue-700 font-semibold">${app.fullName || candidate.name || "N/A"}</button></p><p><strong>Email:</strong> ${app.email || candidate.email || "N/A"}</p><p><strong>Phone:</strong> ${app.phone || "N/A"}</p><p><strong>Location:</strong> ${candidate.location || "N/A"}</p><p><strong>Skills:</strong> ${candidate.skills || "N/A"}</p><p><strong>Website:</strong> ${candidate.website || "N/A"}</p><p><strong>Applied:</strong> ${app.appliedAt ? new Date(app.appliedAt).toLocaleDateString() : "N/A"}</p></div>${candidate.bio ? `<div class="mt-5"><p class="text-sm font-semibold mb-2">Candidate Bio</p><p class="text-slate-600 leading-7">${candidate.bio}</p></div>` : ""}${candidate.overview ? `<div class="mt-5"><p class="text-sm font-semibold mb-2">Candidate Overview</p><p class="text-slate-600 leading-7">${candidate.overview}</p></div>` : ""}<div class="mt-5"><p class="text-sm font-semibold mb-2">Cover Letter</p><p class="text-slate-600 leading-7">${app.coverLetter || "Not provided"}</p></div><div class="mt-5"><button onclick="openResume('${resumePath}', '${(app.fullName || candidate.name || "Candidate").replace(/'/g, "\\'")}')" class="resume-pill">📄 ${resumeName}</button></div></div><div class="flex flex-col gap-3"><label class="text-sm font-semibold text-slate-600">Application Status</label><select onchange="updateStatus('${app.id}', this.value)" class="form-select capitalize">${getStatusOptions(current)}</select><p class="text-xs text-slate-500 leading-6">Changing this status will also update the candidate dashboard.</p></div></div></article>`;
        });
      }
      async function updateStatus(id, status) {
        try {
          await apiFetch(`/applications/${id}/status`, {
            method: "PATCH",
            body: JSON.stringify({ status }),
          });
          showMessage(`Application status updated to "${status}"`);
          await loadRecruiterApplications();
        } catch (err) {
          showMessage(err.message, true);
        }
      }
    </script>
  </body>
</html>
