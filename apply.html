<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply - Smart Job</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    onload="
      protect();
      loadLayout('jobs');
      loadApplyInfo();
    "
  >
    <div id="navbar"></div>
    <main class="pt-28 pb-20 px-6 max-w-5xl mx-auto">
      <div class="grid lg:grid-cols-2 gap-8">
        <div class="card">
          <h2 class="text-2xl font-bold mb-6">Apply for this Job</h2>
          <form id="apply-form" class="space-y-5">
            <input
              id="fullName"
              class="input"
              type="text"
              placeholder="Full Name"
              required
            />
            <input
              id="email"
              class="input"
              type="email"
              placeholder="Email"
              required
            />
            <input
              id="phone"
              class="input"
              type="text"
              placeholder="Phone Number"
            />
            <textarea
              id="coverLetter"
              class="input"
              rows="5"
              placeholder="Why are you a good fit?"
            ></textarea>
            <div>
              <input
                id="resume"
                class="input"
                type="file"
                accept="application/pdf"
                required
              />
              <p id="resume-name" class="text-sm text-slate-500 mt-2"></p>
            </div>
            <button class="btn-primary" type="submit">
              Submit Application
            </button>
          </form>
        </div>
        <div class="card">
          <h3 class="text-xl font-bold mb-4">Application Summary</h3>
          <p id="apply-job-title" class="font-semibold text-lg"></p>
          <p id="apply-job-meta" class="text-slate-500 mt-2"></p>
          <div class="mt-6 text-sm text-slate-500 leading-7">
            <p>
              Your application details will be visible in
              <strong>My Applications</strong>. You can cancel your request
              later if needed.
            </p>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>
    <script src="js/app.js"></script>
    <script>
      let currentJobId = null;
      async function loadApplyInfo() {
        currentJobId = getJobId();
        if (!currentJobId) return (location.href = "jobs.html");
        const job = await apiFetch(`/jobs/${currentJobId}`);
        document.getElementById("apply-job-title").textContent =
          job.title || "Untitled Job";
        document.getElementById("apply-job-meta").textContent =
          `${job.recruiter?.company?.name || "Company"} • ${job.location || "Location not specified"}`;
      }
      document.getElementById("resume").addEventListener("change", () => {
        const f = resume.files[0];
        document.getElementById("resume-name").textContent = f
          ? `Selected: ${f.name}`
          : "";
      });
      document
        .getElementById("apply-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const fd = new FormData();
          fd.append("jobId", currentJobId);
          fd.append("fullName", fullName.value);
          fd.append("email", email.value);
          fd.append("phone", phone.value);
          fd.append("coverLetter", coverLetter.value);
          fd.append("resume", resume.files[0]);
          try {
            await apiFetch("/applications", {
              method: "POST",
              body: fd,
              headers: {},
            });
            showToast("Application submitted successfully");
            setTimeout(() => (location.href = "my-applications.html"), 700);
          } catch (err) {
            showToast(err.message, "error");
          }
        });
    </script>
  </body>
</html>
