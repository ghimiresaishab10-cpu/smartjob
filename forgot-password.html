<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><script src="https://cdn.tailwindcss.com?plugins=forms"></script><link rel="stylesheet" href="css/style.css"/><title>Forgot Password - Smart Job</title></head><body onload="loadLayout()"><div id="navbar"></div><main class="page-shell px-6 max-w-lg mx-auto w-full"><div class="pro-card"><h1 class="text-3xl font-extrabold mb-3">Forgot Password</h1><p class="text-slate-500 mb-6">Enter your email to create a reset token.</p><form id="forgotForm" class="space-y-5"><div><label>Email</label><input id="email" type="email" required placeholder="you@example.com"/></div><button class="btn-primary w-full" type="submit">Create Reset Link</button></form><div id="resetResult" class="mt-5 text-sm text-slate-600"></div></div></main><div id="footer"></div><script src="js/app.js"></script><script>document.getElementById('forgotForm').addEventListener('submit',async e=>{e.preventDefault();try{const data=await apiFetch('/auth/forgot-password',{method:'POST',body:JSON.stringify({email:document.getElementById('email').value})});showToast(data.message||'Reset token created');document.getElementById('resetResult').innerHTML=`<div class="pro-card !p-4"><p class="font-semibold">Development reset link:</p><a class="text-blue-700 break-all" href="reset-password.html?token=${data.token}">reset-password.html?token=${data.token}</a></div>`;}catch(err){showToast(err.message,'error');}});</script></body></html>
