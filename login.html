<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmartJob</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-page login-page">
    <div class="login-wrapper">
      <div class="login-icon-box">💼</div>

      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Continue your journey with Smart Job</p>

      <form id="loginForm" class="login-card">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label>Password</label>
            <a href="#" class="small-link">Forgot password?</a>
          </div>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="stayLoggedIn">
          <label for="stayLoggedIn">Stay logged in for 30 days</label>
        </div>

        <button type="submit" class="primary-btn">Login</button>
        <div id="loginMessage" class="message"></div>

        <div class="or-text">OR CONTINUE WITH</div>

        <div class="social-row">
          <button type="button" class="social-btn">Google</button>
          <button type="button" class="social-btn">LinkedIn</button>
        </div>
      </form>

      <p class="bottom-text">
        New to The Career Curator?
        <a href="signup.html">Create an account</a>
      </p>

      <p class="copyright">
        © 2026 The Career Curator. Editorial Excellence in Talent Acquisition.
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
