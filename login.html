<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Poppins',sans-serif;background:#faf8ff;}</style>
</head>
<body class="min-h-screen flex flex-col">

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center p-3 mb-6 bg-white rounded-xl shadow-sm">
          <span class="text-blue-700 text-2xl font-bold">SJ</span>
        </div>
        <h2 class="text-4xl font-extrabold mb-2">Welcome Back</h2>
        <p class="text-slate-500">Continue your journey with Smart Job</p>
      </div>

      <div class="bg-white p-10 rounded-xl shadow">
        <form id="login-form" class="space-y-6">
          <div>
            <label class="font-bold text-sm block mb-2">Email Address</label>
            <input id="email" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="email" placeholder="name@company.com" required />
          </div>

          <div>
            <label class="font-bold text-sm block mb-2">Password</label>
            <input id="password" class="w-full p-4 rounded-xl bg-slate-100 outline-none" type="password" placeholder="••••••••" required />
          </div>

          <button class="w-full bg-blue-700 text-white py-4 rounded-full font-semibold" type="submit">Login</button>
        </form>

        <p class="text-center mt-8 text-slate-500">
          New to Smart Job?
          <a href="register.html" class="text-blue-700 font-bold hover:underline">Create an account</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    loadComponent("footer", "components/footer.html");

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const data = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
          })
        });

        setUser(data);
        location.href = "jobs.html";
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
