<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Smart Job</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="protect(); loadLayout(); loadSettings()" class="bg-[#faf8ff]">

  <div id="navbar"></div>

  <main class="pt-28 pb-20 px-6 max-w-3xl mx-auto">
    <div class="card">
      <h1 class="text-3xl font-bold mb-8">Profile Settings</h1>

      <form id="settings-form" class="space-y-5">
        <input id="settings-name" class="form-input" type="text" placeholder="Full Name" />
        <input id="settings-email" class="form-input" type="email" placeholder="Email" disabled />
        <input id="settings-role" class="form-input" type="text" placeholder="Role" disabled />

        <button class="btn-primary" type="submit">Save Locally</button>
      </form>

      <p class="text-sm text-slate-500 mt-6">
        This updates the frontend display only. I have not seen a backend profile update route in the code you shared.
      </p>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    function loadSettings() {
      const user = getUser();
      if (!user) return;

      document.getElementById("settings-name").value = user.name || "";
      document.getElementById("settings-email").value = user.email || "";
      document.getElementById("settings-role").value = user.role || "";
    }

    document.getElementById("settings-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const user = getUser();
      if (!user) return;

      user.name = document.getElementById("settings-name").value;
      localStorage.setItem("user", JSON.stringify(user));
      alert("Saved locally");
      location.href = "profile.html";
    });
  </script>
</body>
</html>
