<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find Jobs - SmartJob</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: white;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

.nav-btn {
  background: #2563eb;
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
}

/* MAIN */
.container {
  padding: 40px;
}

h1 {
  margin-bottom: 20px;
}

/* SEARCH */
.search {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.search input {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.search button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
}

/* LAYOUT */
.jobs-container {
  display: flex;
  gap: 20px;
}

/* LEFT FILTER */
.filters {
  width: 250px;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

/* CENTER JOBS */
.jobs {
  flex: 1;
}

.job-card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.job-card h3 {
  margin: 0;
}

.job-card small {
  color: gray;
}

.job-card button {
  margin-top: 10px;
  padding: 8px 15px;
  background: #2563eb;
  color: white;
  border: none;
}

/* RIGHT SIDE */
.side {
  width: 250px;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav>
  <h2>SmartJob</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="find-jobs.html">Find Jobs</a>
    <a href="about.html">About</a>
    <a href="auth.html">Login</a>
    <a href="auth.html#register" class="nav-btn">Register</a>
  </div>
</nav>

<div class="container">

<h1>Discover your next career masterpiece.</h1>

<div class="search">
  <input type="text" placeholder="Job title">
  <input type="text" placeholder="Location">
  <button onclick="getJobs()">Search</button>
</div>

<div class="jobs-container">

  <!-- FILTER -->
  <div class="filters">
    <h4>Filters</h4>
    <p><input type="checkbox"> Design</p>
    <p><input type="checkbox"> Engineering</p>
    <p><input type="checkbox"> Remote</p>
  </div>

  <!-- JOB LIST -->
  <div class="jobs" id="jobList"></div>

  <!-- SIDE -->
  <div class="side">
    <h4>Recommended</h4>
    <p>Senior Product Manager</p>
    <p>UX Designer</p>
  </div>

</div>

</div>

<script>
async function getJobs() {
  const res = await fetch("http://localhost:5000/api/jobs");
  const data = await res.json();

  const jobList = document.getElementById("jobList");
  jobList.innerHTML = "";

  data.jobs.forEach(job => {
    jobList.innerHTML += `
      <div class="job-card">
        <h3>${job.title}</h3>
        <small>${job.companyName} • ${job.location}</small>
        <br>
        <button onclick="viewJob('${job._id}')">View</button>
      </div>
    `;
  });
}

function viewJob(id) {
  window.location.href = "job-details.html?id=" + id;
}

getJobs();
</script>

</body>
</html>
